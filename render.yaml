services:
  - type: web
    name: estoque-app
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: estoque-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: IMPORT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_NAME
        value: Estoque
      - key: ENVIRONMENT
        value: production
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: LEGACY_DATABASE_URL
        sync: false

databases:
  - name: estoque-db
    plan: Basic-256mb
